<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShiftCore Login</title>
  <style>
    /* ===== 全体ここから ===== */
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: 80px auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      text-align: center;
    }

    p {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 16px;
    }

    #loginBtn {
      background: #111;
      color: #fff;
    }

    .status-box {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      background: #f0f0f0;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    /* ===== 全体ここまで ===== */
  </style>
</head>
<body>
  <div class="container">
    <h1>ShiftCore</h1>
    <p>Googleアカウントでログインしてください。</p>

    <button id="loginBtn">Googleでログイン</button>

    <div id="statusBox" class="status-box">ログイン状態を確認中...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    // ===== 設定ここから =====
    const firebaseConfig = {
      apiKey: "AIzaSyAXDhMT1IP1xQ9f0WiOIjmmfBHoQDWZ0dI",
      authDomain: "shiftcore-div.firebaseapp.com",
      projectId: "shiftcore-div",
      storageBucket: "shiftcore-div.firebasestorage.app",
      messagingSenderId: "882342275588",
      appId: "1:882342275588:web:bab610608d1bc00453e351"
    };

    const LOGIN_CHECK_URL = "https://shiftcore-login-proxy.shiftcore-div.workers.dev/";
    const DASHBOARD_URL = "./dashboard.html";
    // ===== 設定ここまで =====

    // ===== 初期化ここから =====
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("loginBtn");
    const statusBox = document.getElementById("statusBox");
    // ===== 初期化ここまで =====

    // ===== 表示制御ここから =====
    function setStatus(message) {
      statusBox.textContent = message;
    }

    function showLoggedOutState(message = "未ログイン") {
      loginBtn.style.display = "block";
      setStatus(message);
    }
    // ===== 表示制御ここまで =====

    // ===== セッション保存ここから =====
    function saveLoginSession(loginCheck) {
      sessionStorage.setItem("shiftcore_user", JSON.stringify(loginCheck.user));
    }

    function clearLoginSession() {
      sessionStorage.removeItem("shiftcore_user");
    }
    // ===== セッション保存ここまで =====

    // ===== GAS照合ここから =====
    async function checkUserWithGas(email) {
      const response = await fetch(LOGIN_CHECK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({ email })
      });

      const result = await response.json();
      return result;
    }
    // ===== GAS照合ここまで =====

    // ===== ログイン済みユーザー確認ここから =====
    async function verifySignedInUser(user) {
      if (!user || !user.email) {
        clearLoginSession();
        showLoggedOutState("未ログイン");
        return;
      }

      try {
        setStatus("アカウント照合中...");

        const loginCheck = await checkUserWithGas(user.email);

        if (loginCheck.ok) {
          saveLoginSession(loginCheck);
          window.location.href = DASHBOARD_URL;
          return;
        }

        clearLoginSession();
        await signOut(auth);
        showLoggedOutState(
          "ログイン不可\n\n" +
          "code: " + loginCheck.code + "\n" +
          "message: " + loginCheck.message
        );
      } catch (error) {
        clearLoginSession();
        showLoggedOutState("エラー\n\n" + error.message);
      }
    }
    // ===== ログイン済みユーザー確認ここまで =====

    // ===== 永続化設定ここから =====
    await setPersistence(auth, browserLocalPersistence);
    // ===== 永続化設定ここまで =====

    // ===== ログイン処理ここから =====
    loginBtn.addEventListener("click", async () => {
      try {
        setStatus("Googleログイン中...");

        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        await verifySignedInUser(user);
      } catch (error) {
        showLoggedOutState("エラー\n\n" + error.message);
      }
    });
    // ===== ログイン処理ここまで =====

    // ===== 認証状態監視ここから =====
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await verifySignedInUser(user);
      } else {
        clearLoginSession();
        showLoggedOutState("未ログイン");
      }
    });
    // ===== 認証状態監視ここまで =====
  </script>
</body>
</html>
